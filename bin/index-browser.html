<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>CastleDB Browser</title>
	<style>
		* { box-sizing: border-box; }
		body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; }
		
		#menu { background: #333; color: white; padding: 8px 10px; display: flex; gap: 8px; align-items: center; }
		#menu button { background: #555; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; }
		#menu button:hover { background: #666; }
		#menu .title { font-weight: bold; font-size: 14px; margin-right: 10px; }
		
		#toolbar { background: #f5f5f5; padding: 6px 10px; display: none; border-bottom: 1px solid #ddd; }
		#toolbar button { background: #fff; border: 1px solid #ccc; padding: 5px 10px; cursor: pointer; margin-right: 5px; border-radius: 3px; font-size: 12px; }
		#toolbar button:hover { background: #e8e8e8; }
		#toolbar .search-box { float: right; }
		#toolbar .search-box input { padding: 5px 10px; border: 1px solid #ccc; border-radius: 3px; width: 200px; }
		#toolbar .search-box .clear-btn { margin-left: 5px; cursor: pointer; color: #666; }
		
		.sheet-tabs { background: #f0f0f0; padding: 5px 5px 0 5px; border-bottom: 1px solid #ddd; display: none; min-height: 35px; }
		.sheet-tabs .tab { display: inline-block; padding: 8px 15px; cursor: pointer; background: #e0e0e0; margin-right: 2px; border-radius: 3px 3px 0 0; border: 1px solid #ccc; border-bottom: none; font-size: 12px; }
		.sheet-tabs .tab:hover { background: #d0d0d0; }
		.sheet-tabs .tab.active { background: white; font-weight: bold; border-color: #ddd; margin-bottom: -1px; padding-bottom: 9px; }
		
		#content { padding: 10px; display: none; overflow: auto; }
		.table-container { overflow-x: auto; }
		table { border-collapse: collapse; width: 100%; background: white; }
		th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; white-space: nowrap; }
		th { background: #f5f5f5; font-weight: bold; cursor: context-menu; position: relative; }
		th:hover { background: #e8e8e8; }
		tr:hover { background: #f9f9f9; }
		tr.selected { background: #e3f2fd !important; }
		
		tr.separator-row { background: #f0f0f0 !important; cursor: pointer; }
		tr.separator-row td { font-weight: bold; color: #666; border-top: 2px solid #ccc; }
		tr.separator-row:hover { background: #e0e0e0 !important; }
		
		#welcome { text-align: center; padding: 50px; }
		#welcome h1 { color: #333; margin-bottom: 20px; }
		#welcome button { background: #4A90D9; color: white; border: none; padding: 15px 30px; font-size: 16px; cursor: pointer; border-radius: 5px; margin: 5px; }
		#welcome button:hover { background: #357ABD; }
		#welcome button.secondary { background: #5cb85c; }
		#recent-files { margin-top: 30px; text-align: left; display: inline-block; }
		#recent-files h3 { color: #666; margin-bottom: 10px; }
		#recent-files ul { list-style: none; padding: 0; }
		#recent-files li { padding: 5px 0; }
		#recent-files a { color: #4A90D9; cursor: pointer; }
		#recent-files a:hover { text-decoration: underline; }
		
		.context-menu { position: absolute; background: white; border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); padding: 0; min-width: 160px; display: none; z-index: 1000; border-radius: 4px; }
		.context-menu li { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee; list-style: none; font-size: 12px; }
		.context-menu li:hover { background: #f0f0f0; }
		.context-menu li.disabled { color: #999; cursor: default; }
		.context-menu li.separator { border-top: 1px solid #ddd; margin-top: 5px; padding-top: 10px; }
		.context-menu .submenu { position: relative; }
		.context-menu .submenu:after { content: "▶"; float: right; font-size: 10px; }
		
		.status-bar { background: #f5f5f5; padding: 5px 10px; font-size: 11px; color: #666; border-top: 1px solid #ddd; display: none; position: fixed; bottom: 0; left: 0; right: 0; }
		
		.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 2000; }
		.modal-content { background: white; padding: 20px; border-radius: 8px; min-width: 350px; max-width: 700px; max-height: 85vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
		.modal h2 { margin-top: 0; margin-bottom: 15px; font-size: 16px; }
		.modal-buttons { text-align: right; margin-top: 15px; }
		.modal-buttons button { margin-left: 10px; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
		.modal-buttons .btn-primary { background: #4A90D9; color: white; }
		.modal-buttons .btn-primary:hover { background: #357ABD; }
		.modal-buttons .btn-secondary { background: #ccc; color: #333; }
		.modal-buttons .btn-danger { background: #d9534f; color: white; }
		
		.form-group { margin-bottom: 12px; }
		.form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 12px; }
		.form-group input[type="text"], .form-group input[type="number"], .form-group select, .form-group textarea { 
			width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; 
		}
		.form-group textarea { min-height: 60px; resize: vertical; }
		.form-row { display: flex; gap: 10px; }
		.form-row .form-group { flex: 1; }
		.checkbox-label { display: flex; align-items: center; gap: 5px; font-weight: normal; }
		.checkbox-label input { width: auto; }
		
		.color-input { width: 60px; height: 30px; padding: 0; border: 1px solid #ddd; }
		.color-cell { width: 80px; height: 26px; border: 1px solid #ddd; border-radius: 3px; cursor: pointer; }
		.sp-preview { width: 20px !important; height: 20px !important; }
		.sp-container { border-radius: 4px; }
		
		.image-preview { max-width: 100px; max-height: 60px; cursor: pointer; border: 1px solid #ddd; border-radius: 3px; }
		.image-preview:hover { border-color: #4A90D9; }
		.image-missing { color: #c62828; cursor: pointer; font-size: 11px; }
		.image-upload-btn { padding: 4px 8px; background: #4A90D9; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 11px; }
		.image-upload-btn:hover { background: #357ABD; }
		.flags-cell label { display: inline-block; margin-right: 10px; font-size: 11px; }
		.flags-cell input[type="checkbox"] { width: auto; margin-right: 3px; }
		
		#table-body input[type="text"], #table-body input[type="number"] { 
			width: 100%; border: 1px solid transparent; padding: 4px; background: transparent; 
		}
		#table-body input[type="text"]:focus, #table-body input[type="number"]:focus { 
			border-color: #4A90D9; background: white; 
		}
		#table-body select { width: 100%; padding: 4px; border: 1px solid transparent; background: transparent; }
		#table-body select:focus { border-color: #4A90D9; }
		
		.sub-sheet-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
		.sub-sheet-table th, .sub-sheet-table td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; font-size: 12px; }
		.sub-sheet-table th { background: #f5f5f5; }
		.sub-sheet-table input, .sub-sheet-table select { width: 100%; padding: 4px; border: 1px solid #ccc; }
		
		.gradient-editor { display: flex; gap: 20px; }
		.gradient-preview { width: 200px; height: 50px; border: 1px solid #ddd; border-radius: 4px; }
		.gradient-stops { flex: 1; }
		.gradient-stop { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
		.gradient-stop input[type="color"] { width: 40px; height: 30px; }
		.gradient-stop input[type="range"] { flex: 1; }
		
		.curve-editor { position: relative; }
		.curve-canvas { border: 1px solid #ddd; background: #fafafa; cursor: crosshair; }
		.curve-points { margin-top: 10px; }
		.curve-point { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
		
		.toast { position: fixed; bottom: 50px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 4px; z-index: 3000; opacity: 0; transition: opacity 0.3s; }
		.toast.show { opacity: 1; }
		.toast.error { background: #d9534f; }
		.toast.success { background: #5cb85c; }
		
		.loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.5); color: white; padding: 20px 40px; border-radius: 8px; z-index: 2500; display: none; }
		.loading.show { display: block; }
		
		.kbd { background: #f0f0f0; border: 1px solid #ccc; border-radius: 3px; padding: 1px 4px; font-size: 10px; margin-left: 5px; }
		
		.ref-badge { background: #ffebee; color: #c62828; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-left: 5px; }
	</style>
</head>
<body>
	<div id="menu">
		<span class="title">CastleDB</span>
		<button onclick="openFile()" title="Open .cdb file">Open</button>
		<button onclick="saveFile()" title="Save (Ctrl+S)">Save</button>
		<button onclick="saveFileAs()">Save As</button>
		<button onclick="showNewSheetModal()">New Sheet</button>
		<button onclick="showNewColumnModal()">New Column</button>
	</div>
	
	<input type="file" id="image-file-input" accept="image/*" style="display:none" onchange="handleImageFileSelect(this)">
	
	<div id="welcome">
		<h1>Welcome to CastleDB</h1>
		<p style="color:#666;margin-bottom:20px;">Browser-based editor for macOS ARM64</p>
		<button onclick="openFile()">Open .cdb File</button>
		<button class="secondary" onclick="createNewFile()">Create New Database</button>
		<div id="recent-files" style="display: none;">
			<h3>Recent Files</h3>
			<ul id="recent-list"></ul>
		</div>
	</div>
	
	<div id="toolbar">
		<button onclick="addRow()" title="Add new row">+ Add Row</button>
		<button onclick="insertRowAt(selectedRow >= 0 ? selectedRow : 0)">Insert Row</button>
		<button onclick="deleteSelectedRow()" title="Delete selected row">Delete Row</button>
		<span style="margin-left:20px;color:#888;">|</span>
		<button onclick="CastleDBApp.undo()" title="Undo (Ctrl+Z)">Undo</button>
		<button onclick="CastleDBApp.redo()" title="Redo (Ctrl+Y)">Redo</button>
		<span style="margin-left:20px;color:#888;">|</span>
		<button onclick="showCustomTypesModal()">Custom Types</button>
		<div class="search-box">
			<input type="text" id="search-input" placeholder="Filter rows... (Ctrl+F)" oninput="applyFilter()">
			<span class="clear-btn" onclick="clearFilter()" style="cursor:pointer;margin-left:5px;color:#666;">✕</span>
		</div>
	</div>
	<div class="sheet-tabs" id="sheet-tabs"></div>
	<div id="content">
		<div class="table-container">
			<table id="data-table">
				<thead id="table-head"></thead>
				<tbody id="table-body"></tbody>
			</table>
		</div>
	</div>
	<div class="status-bar" id="status-bar"></div>
	
	<ul class="context-menu" id="column-menu"></ul>
	<ul class="context-menu" id="row-menu"></ul>
	<ul class="context-menu" id="sheet-menu"></ul>
	
	<div id="modal-container"></div>
	<div class="loading" id="loading">Loading...</div>
	<div class="toast" id="toast"></div>
	
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/spectrum-colorpicker2/dist/spectrum.min.css">
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/spectrum-colorpicker2/dist/spectrum.min.js"></script>
	<script src="castle-browser.js"></script>
	<script>
		var currentFileName = null;
		var selectedRowIndex = -1;
		var selectedColIndex = -1;
		var fileHandle = null;
		var hasFileSystemAccess = 'showOpenFilePicker' in window;
		var editingColumnIndex = -1;
		
		function checkFileSystemAccess() {
			return hasFileSystemAccess && window.isSecureContext;
		}
		
		// ==================== Toast Notifications ====================
		
		function showToast(message, type) {
			type = type || 'info';
			var toast = $('#toast');
			toast.text(message).removeClass('error success').addClass(type + ' show');
			setTimeout(function() { toast.removeClass('show'); }, 3000);
		}
		
		function showLoading(show) {
			$('#loading').toggleClass('show', show);
		}
		
		// ==================== File Operations ====================
		
		async function openFile() {
			if (checkFileSystemAccess()) {
				try {
					var handles = await window.showOpenFilePicker({
						types: [{ description: 'CDB Files', accept: { 'application/json': ['.cdb'] } }],
						multiple: false
					});
					showLoading(true);
					fileHandle = handles[0];
					var file = await fileHandle.getFile();
					currentFileName = file.name;
					var content = await file.text();
					try {
						CastleDBApp.loadCDB(content);
						addToRecent(file.name);
					} catch(e) {
						showLoading(false);
						console.error("LoadCDB error:", e);
						showToast('Error loading file: ' + (e.message || e), 'error');
						throw e;
					}
					showEditor();
					showToast('File loaded successfully', 'success');
				} catch (err) {
					if (err.name === 'AbortError') return;
					showLoading(false);
					console.error('Error opening file:', err);
					showToast('Error opening file: ' + err.message, 'error');
					return;
				}
				showLoading(false);
			} else {
				openFileFallback();
			}
		}
		
		function openFileFallback() {
			var input = document.createElement('input');
			input.type = 'file';
			input.accept = '.cdb';
			input.onchange = function(e) {
				var file = e.target.files[0];
				if (file) {
					showLoading(true);
					currentFileName = file.name;
					fileHandle = null;
					var reader = new FileReader();
					reader.onload = function(e) {
						try {
							CastleDBApp.loadCDB(e.target.result);
							addToRecent(file.name);
							showEditor();
							showToast('File loaded successfully', 'success');
						} catch (err) {
							showToast('Error loading file: ' + err, 'error');
						} finally {
							showLoading(false);
						}
					};
					reader.readAsText(file);
				}
			};
			input.click();
		}
		
		function handleImageFileSelect(input) {
			var file = input.files[0];
			if (!file) return;
			
			var reader = new FileReader();
			reader.onload = function(e) {
				var dataUrl = e.target.result;
				CastleDBApp.handleImageUpload(dataUrl, file.name);
				input.value = '';
			};
			reader.readAsDataURL(file);
		}
		
		async function saveFile() {
			var content = CastleDBApp.getCDBContent();
			if (!content) return;
			
			if (checkFileSystemAccess() && fileHandle) {
				try {
					var writable = await fileHandle.createWritable();
					await writable.write(content);
					await writable.close();
					showToast('File saved', 'success');
					return;
				} catch (err) {
					console.log('Direct write failed:', err);
				}
			}
			await saveFileAs();
		}
		
		async function saveFileAs() {
			var content = CastleDBApp.getCDBContent();
			if (!content) return;
			
			if (checkFileSystemAccess()) {
				try {
					var handle = await window.showSaveFilePicker({
						suggestedName: currentFileName || 'data.cdb',
						types: [{ description: 'CDB Files', accept: { 'application/json': ['.cdb'] } }]
					});
					showLoading(true);
					var writable = await handle.createWritable();
					await writable.write(content);
					await writable.close();
					fileHandle = handle;
					currentFileName = handle.name;
					showToast('File saved as ' + currentFileName, 'success');
				} catch (err) {
					showLoading(false);
					if (err.name === 'AbortError') return;
					console.error('Save error:', err);
					showToast('Save failed: ' + err.message, 'error');
					return;
				}
				showLoading(false);
			} else {
				downloadFallback(content);
			}
		}
		
		function downloadFallback(content) {
			var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
			var url = URL.createObjectURL(blob);
			var a = document.createElement('a');
			a.href = url;
			a.download = currentFileName || 'data.cdb';
			document.body.appendChild(a);
			a.click();
			setTimeout(function() { URL.revokeObjectURL(url); a.remove(); }, 100);
		}
		
		function createNewFile() {
			CastleDBApp.createNewDatabase();
			currentFileName = 'new_database.cdb';
			fileHandle = null;
			showEditor();
			showToast('New database created', 'success');
		}
		
		// ==================== UI Helpers ====================
		
		function showEditor() {
			$('#welcome').hide();
			$('#toolbar').show();
			$('.sheet-tabs').show();
			$('#content').show();
			$('#status-bar').show();
		}
		
		function updateStatusBar(msg) {
			var info = CastleDBApp.getSheetInfo();
			var text = info.rowCount + ' rows | ' + info.colCount + ' columns' + (msg ? ' | ' + msg : '');
			$('#status-bar').text(text);
		}
		
		function addToRecent(fileName) {
			try {
				var recent = CastleDBApp.getRecentFiles();
				recent = recent.filter(function(f) { return f !== fileName; });
				recent.unshift(fileName);
				if (recent.length > 10) recent.pop();
				localStorage.setItem('castle_recent', JSON.stringify(recent));
				updateRecentList();
			} catch(e) {}
		}
		
		function updateRecentList() {
			try {
				var recent = CastleDBApp.getRecentFiles();
				if (recent && recent.length > 0) {
					var html = recent.map(function(f) {
						return '<li><a onclick="openRecent(\'' + f + '\')">' + f + '</a></li>';
					}).join('');
					$('#recent-files').show();
					$('#recent-list').html(html);
				}
			} catch(e) {}
		}
		
		function openRecent(fileName) {
			showToast('Please open the file manually: ' + fileName, 'info');
		}
		
		// ==================== Search/Filter ====================
		
		function applyFilter() {
			var filter = $('#search-input').val();
			CastleDBApp.setFilter(filter);
		}
		
		function clearFilter() {
			$('#search-input').val('');
			CastleDBApp.setFilter(null);
		}
		
		// ==================== Row Operations ====================
		
		function addRow() {
			CastleDBApp.addRow();
			updateStatusBar('Row added');
		}
		
		function insertRowAt(index) {
			if (index < 0) index = 0;
			CastleDBApp.insertRow(index);
			updateStatusBar('Row inserted');
		}
		
		function deleteSelectedRow() {
			if (selectedRowIndex >= 0) {
				CastleDBApp.deleteRow(selectedRowIndex);
				updateStatusBar('Row deleted');
			}
		}
		
		// ==================== Column Context Menu ====================
		
		function showColumnContextMenu(e, colIndex) {
			e.preventDefault();
			selectedColIndex = colIndex;
			var colInfo = CastleDBApp.getColumnInfo(CastleDBApp.getCurrentSheetName(), colIndex);
			var menu = $('#column-menu');
			
			var convSubmenu = '';
			if (colInfo && (colInfo.type === 'string' || colInfo.type === 'id')) {
				convSubmenu = '<li class="submenu">Convert ▼<ul class="context-menu" style="display:none;left:150px;top:0;">' +
					'<li onclick="convertColumn(' + colIndex + ', \'lower\')">lowercase</li>' +
					'<li onclick="convertColumn(' + colIndex + ', \'upper\')">UPPERCASE</li>' +
					'<li onclick="convertColumn(' + colIndex + ', \'title\')">Title Case</li>' +
					'</ul></li>';
			} else if (colInfo && (colInfo.type === 'int' || colInfo.type === 'float')) {
				convSubmenu = '<li class="submenu">Convert ▼<ul class="context-menu" style="display:none;left:150px;top:0;">' +
					'<li onclick="convertColumn(' + colIndex + ', \'mul10\')">× 10</li>' +
					'<li onclick="convertColumn(' + colIndex + ', \'div10\')">÷ 10</li>' +
					'<li onclick="convertColumn(' + colIndex + ', \'add1\')">+ 1</li>' +
					'<li onclick="convertColumn(' + colIndex + ', \'sub1\')">− 1</li>' +
					'</ul></li>';
			}
			
			var html = 
				'<li onclick="showEditColumnModal(' + colIndex + ')">Edit Column</li>' +
				'<li onclick="deleteColumn(' + colIndex + ')">Delete Column</li>' +
				'<li class="separator"></li>' +
				'<li onclick="addColumnAt(' + colIndex + ')">Insert Column Left</li>' +
				'<li onclick="addColumnAt(' + (colIndex + 1) + ')">Insert Column Right</li>' +
				'<li class="separator"></li>' +
				'<li onclick="moveColumn(' + colIndex + ', -1)">Move Left</li>' +
				'<li onclick="moveColumn(' + colIndex + ', 1)">Move Right</li>' +
				'<li class="separator"></li>' +
				convSubmenu +
				'<li onclick="setDisplayColumn(' + colIndex + ')">' + (colInfo && colInfo.displayColumn ? '✓ ' : '') + 'Display Column</li>' +
				'<li onclick="setDisplayIcon(' + colIndex + ')">' + (colInfo && colInfo.displayIcon ? '✓ ' : '') + 'Display Icon</li>';
			
			menu.html(html);
			positionContextMenu(menu, e.pageX, e.pageY);
			menu.show();
			
			menu.find('.submenu').hover(function() {
				$(this).find('ul').first().show();
			}, function() {
				$(this).find('ul').first().hide();
			});
		}
		
		function convertColumn(colIndex, type) {
			CastleDBApp.convertColumn(CastleDBApp.getCurrentSheetName(), colIndex, type);
			showToast('Column converted', 'success');
		}
		
		function deleteColumn(colIndex) {
			if (confirm('Delete this column and all its data?')) {
				CastleDBApp.deleteColumn(CastleDBApp.getCurrentSheetName(), colIndex);
				showToast('Column deleted', 'success');
			}
		}
		
		function addColumnAt(index) {
			showNewColumnModal(index);
		}
		
		function moveColumn(colIndex, delta) {
			CastleDBApp.moveColumn(CastleDBApp.getCurrentSheetName(), colIndex, delta);
		}
		
		function setDisplayColumn(colIndex) {
			var colInfo = CastleDBApp.getColumnInfo(CastleDBApp.getCurrentSheetName(), colIndex);
			if (colInfo) {
				CastleDBApp.setDisplayColumn(CastleDBApp.getCurrentSheetName(), colInfo.name);
			}
		}
		
		function setDisplayIcon(colIndex) {
			var colInfo = CastleDBApp.getColumnInfo(CastleDBApp.getCurrentSheetName(), colIndex);
			if (colInfo) {
				CastleDBApp.setDisplayIcon(CastleDBApp.getCurrentSheetName(), colInfo.name);
			}
		}
		
		// ==================== Sheet Context Menu ====================
		
		function showSheetContextMenu(e, sheetName) {
			e.preventDefault();
			e.stopPropagation();
			var menu = $('#sheet-menu');
			var sheets = CastleDBApp.getSheetNames();

		// ==================== Context Menu Positioning ====================
		
		function positionContextMenu(menu, x, y) {
			var menuWidth = menu.outerWidth();
			var menuHeight = menu.outerHeight();
			var windowWidth = $(window).width();
			var windowHeight = $(window).height();
			
			if (x + menuWidth > windowWidth - 10) x = windowWidth - menuWidth - 10;
			if (y + menuHeight > windowHeight - 10) y = windowHeight - menuHeight - 10;
			if (x < 0) x = 0;
			if (y < 0) y = 0;
			
			menu.css({ left: x + 'px', top: y + 'px' });
		}

			subData.columns.forEach(function(col) {

			var bodyHtml = '';
			var lines = subData.lines || [];
			lines.forEach(function(line, idx) {
				bodyHtml += '<tr data-row="' + idx + '">';
				subData.columns.forEach(function(col) {
					var val = line ? (line[col.name] || '') : '';
					bodyHtml += '<td><input type="text" data-row="' + idx + '" data-col="' + escapeHtml(col.name) + '" value="' + escapeHtml(String(val)) + '" onchange="updateSubCell(this)"></td>';

			});

				'<h2>Edit List: ' + escapeHtml(info.columnName) + '</h2>' +
				'<div style="max-height:400px;overflow:auto;">' +
				'<table class="sub-sheet-table" id="sub-table"><thead>' + headHtml + '</thead><tbody id="sub-table-body">' + bodyHtml + '</tbody></table>' +
				'</div>' +
				'<button onclick="addSubRow()" style="margin-top:10px;padding:8px 15px;background:#4A90D9;color:white;border:none;border-radius:4px;cursor:pointer;">+ Add Row</button>' +
				'<div class="modal-buttons">' +
				'<button class="btn-primary" onclick="closeSubEditor()">Done</button>' +
				'</div></div></div>';
			
			$('#modal-container').html(html);
		}
		
		function openPropsEditor(rowIndex, colIndex) {
			var info = CastleDBApp.openSubSheet(rowIndex, colIndex);
			if (!info) {
				showToast('Could not open properties editor', 'error');
				return;
			}
			
			var subData = CastleDBApp.getSubSheetData();
			if (!subData || !subData.columns || subData.columns.length === 0) {
				showToast('No properties schema defined', 'error');
				return;
			}
			
			var data = info.data || {};
			var html = '<div class="modal"><div class="modal-content" style="max-width:500px;">' +
				'<h2>Edit Properties: ' + escapeHtml(info.columnName) + '</h2>' +
				'<input type="hidden" id="props-row" value="' + rowIndex + '">' +
				'<input type="hidden" id="props-col" value="' + colIndex + '">';

				var val = data[col.name];

				if (col.type === 'bool') {
					html += '<select data-col="' + escapeHtml(col.name) + '" onchange="updatePropCell(this)">' +
						'<option value=""' + (!val ? ' selected' : '') + '>--</option>' +
						'<option value="true"' + (val === true ? ' selected' : '') + '>true</option>' +
						'<option value="false"' + (val === false ? ' selected' : '') + '>false</option></select>';
				} else if (col.type === 'int' || col.type === 'float') {
					html += '<input type="number" data-col="' + escapeHtml(col.name) + '" value="' + (val != null ? val : '') + '" step="any" onchange="updatePropCell(this)">';
				} else {
					html += '<input type="text" data-col="' + escapeHtml(col.name) + '" value="' + escapeHtml(String(val != null ? val : '')) + '" onchange="updatePropCell(this)">';
				}
				html += '</div>';
			});
			
			html += '<div class="modal-buttons">' +
				'<button class="btn-primary" onclick="closeSubEditor()">Done</button>' +
				'</div></div></div>';
			
			$('#modal-container').html(html);
		}
		
		function updateSubCell(input) {
			var row = parseInt($(input).attr('data-row'));
			var col = $(input).attr('data-col');
			CastleDBApp.updateSubSheetCell(row, col, $(input).val());
		}
		
		function updatePropCell(input) {
			var col = $(input).attr('data-col');
			var val = $(input).val();
			if (val === 'true') val = true;
			else if (val === 'false') val = false;
			else if (val === '' || val === null) val = null;
			
			var rowIndex = parseInt($('#props-row').val());
			var colIndex = parseInt($('#props-col').val());
			
			var info = CastleDBApp.openSubSheet(rowIndex, colIndex);
			if (info && info.data) {
				info.data[col] = val;
			}
		}
		
		function addSubRow() {

			var subData = CastleDBApp.getSubSheetData();
			var idx = (subData.lines || []).length - 1;
			var cols = subData.columns || [];
			var rowHtml = '<tr data-row="' + idx + '">';
			cols.forEach(function(col) {
				rowHtml += '<td><input type="text" data-row="' + idx + '" data-col="' + escapeHtml(col.name) + '" value="" onchange="updateSubCell(this)"></td>';
			});

		// ==================== Gradient Editor ====================
		
		function openGradientEditor(rowIndex, colIndex) {
			var info = CastleDBApp.openGradientEditor(rowIndex, colIndex);
			if (!info) {
				showToast('Could not open gradient editor', 'error');
				return;
			}
			
			var colors = info.colors || [0xFF0000, 0x00FF00, 0x0000FF];
			var positions = info.positions || [0.0, 0.5, 1.0];
			
			var stopsHtml = '';
			for (var i = 0; i < colors.length; i++) {
				var colorHex = colors[i].toString(16);
				while (colorHex.length < 6) colorHex = '0' + colorHex;
				stopsHtml += '<div class="gradient-stop">' +
					'<input type="color" value="#' + colorHex + '" onchange="updateGradientPreview()">' +
					'<input type="range" min="0" max="100" value="' + (positions[i] * 100) + '" onchange="updateGradientPreview()">' +
					'<button onclick="removeGradientStop(this)" style="background:none;border:none;color:red;cursor:pointer;">✕</button>' +
					'</div>';
			}
			
			var html = '<div class="modal"><div class="modal-content" style="max-width:600px;">' +
				'<h2>Edit Gradient</h2>' +
				'<input type="hidden" id="grad-row" value="' + rowIndex + '">' +
				'<input type="hidden" id="grad-col" value="' + colIndex + '">' +
				'<div class="gradient-editor">' +
				'<div class="gradient-preview" id="grad-preview" style="background:linear-gradient(to right, ' + 
				colors.map(function(c, i) { 
					var h = c.toString(16); while(h.length < 6) h = '0' + h;
					return '#' + h + ' ' + (positions[i] * 100) + '%'; 
				}).join(', ') + ')"></div>' +
				'<div class="gradient-stops" id="grad-stops">' + stopsHtml + '</div>' +
				'</div>' +
				'<button onclick="addGradientStop()" style="margin-top:10px;padding:8px 15px;background:#4A90D9;color:white;border:none;border-radius:4px;cursor:pointer;">+ Add Color Stop</button>' +
				'<div class="modal-buttons">' +
				'<button class="btn-secondary" onclick="closeModal()">Cancel</button>' +
				'<button class="btn-primary" onclick="saveGradient()">Save</button>' +
				'</div></div></div>';
			
			$('#modal-container').html(html);
		}
		
		function addGradientStop() {
			var stops = $('#grad-stops');
			var newStop = '<div class="gradient-stop">' +
				'<input type="color" value="#808080" onchange="updateGradientPreview()">' +
				'<input type="range" min="0" max="100" value="50" onchange="updateGradientPreview()">' +
				'<button onclick="removeGradientStop(this)" style="background:none;border:none;color:red;cursor:pointer;">✕</button>' +
				'</div>';
			stops.append(newStop);
			updateGradientPreview();
		}
		
		function removeGradientStop(btn) {
			$(btn).parent().remove();
			updateGradientPreview();
		}
		
		function updateGradientPreview() {
			var stops = [];
			var positions = [];
			$('#grad-stops .gradient-stop').each(function() {
				var color = $(this).find('input[type="color"]').val();
				var pos = parseInt($(this).find('input[type="range"]').val()) / 100;
				var colorInt = parseInt(color.replace('#', ''), 16);
				stops.push(colorInt);
				positions.push(pos);
			});
			
			var gradientStr = 'to right, ' + stops.map(function(c, i) {
				var h = c.toString(16); while(h.length < 6) h = '0' + h;
				return '#' + h + ' ' + (positions[i] * 100) + '%';
			}).join(', ');
			
			$('#grad-preview').css('background', 'linear-gradient(' + gradientStr + ')');
		}
		
		function saveGradient() {
			var rowIndex = parseInt($('#grad-row').val());
			var colIndex = parseInt($('#grad-col').val());
			var colors = [];
			var positions = [];
			
			$('#grad-stops .gradient-stop').each(function() {
				var color = $(this).find('input[type="color"]').val();
				var pos = parseInt($(this).find('input[type="range"]').val()) / 100;
				colors.push(parseInt(color.replace('#', ''), 16));
				positions.push(pos);
			});
			
			CastleDBApp.saveGradient(rowIndex, colIndex, colors, positions);
			closeModal();
			showToast('Gradient saved', 'success');
		}
		
		// ==================== Curve Editor ====================
		
		function openCurveEditor(rowIndex, colIndex) {
			var info = CastleDBApp.openCurveEditor(rowIndex, colIndex);
			if (!info) {
				showToast('Could not open curve editor', 'error');
				return;
			}
			
			var points = info.points || [];
			
			var pointsHtml = '';
			for (var i = 0; i < points.length; i += 6) {
				var time = points[i] || 0;
				var value = points[i + 1] || 0;
				pointsHtml += '<div class="curve-point">' +
					'<span>Time:</span><input type="number" value="' + time + '" step="0.1" style="width:80px;">' +
					'<span>Value:</span><input type="number" value="' + value + '" step="0.1" style="width:80px;">' +
					'<button onclick="removeCurvePoint(this)" style="background:none;border:none;color:red;cursor:pointer;">✕</button>' +
					'</div>';
			}
			
			var html = '<div class="modal"><div class="modal-content" style="max-width:500px;">' +
				'<h2>Edit Curve</h2>' +
				'<input type="hidden" id="curve-row" value="' + rowIndex + '">' +
				'<input type="hidden" id="curve-col" value="' + colIndex + '">' +
				'<p style="color:#666;font-size:12px;">Edit curve keyframes (time, value pairs).</p>' +
				'<div class="curve-points" id="curve-points">' + pointsHtml + '</div>' +
				'<button onclick="addCurvePoint()" style="margin-top:10px;padding:8px 15px;background:#4A90D9;color:white;border:none;border-radius:4px;cursor:pointer;">+ Add Keyframe</button>' +
				'<div class="modal-buttons">' +
				'<button class="btn-secondary" onclick="closeModal()">Cancel</button>' +
				'<button class="btn-primary" onclick="saveCurve()">Save</button>' +
				'</div></div></div>';
			
			$('#modal-container').html(html);
		}
		
		function addCurvePoint() {
			var newPoint = '<div class="curve-point">' +
				'<span>Time:</span><input type="number" value="0" step="0.1" style="width:80px;">' +
				'<span>Value:</span><input type="number" value="0" step="0.1" style="width:80px;">' +
				'<button onclick="removeCurvePoint(this)" style="background:none;border:none;color:red;cursor:pointer;">✕</button>' +
				'</div>';
			$('#curve-points').append(newPoint);
		}
		
		function removeCurvePoint(btn) {
			$(btn).parent().remove();
		}
		
		function saveCurve() {
			var rowIndex = parseInt($('#curve-row').val());
			var colIndex = parseInt($('#curve-col').val());
			var points = [];
			
			$('#curve-points .curve-point').each(function() {
				var inputs = $(this).find('input');
				points.push(parseFloat(inputs[0].value) || 0);
				points.push(parseFloat(inputs[1].value) || 0);
				points.push(-10000000000); // HandleData marker
				points.push(0); // prevDt
				points.push(0); // prevDv
				points.push(0); // nextDt
				points.push(0); // nextDv
			});
			
			CastleDBApp.saveCurve(rowIndex, colIndex, points);
			closeModal();
			showToast('Curve saved', 'success');
		}
		
		function escapeHtml(s) {
			if (s == null) return '';
			return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
		}
		
		function setupCellHandlers() {
			$('.edit-cell').off('change').on('change', function(e) {
				var target = $(e.target);
				var row = parseInt(target.attr('data-row'));
				var col = parseInt(target.attr('data-col'));
				var value = null;
				
				if (target.hasClass('flag-check')) {
					var flagsCell = target.closest('.flags-cell');
					var currentFlags = 0;
					flagsCell.find('.flag-check').each(function() {
						if ($(this).is(':checked')) {
							currentFlags |= (1 << parseInt($(this).attr('data-flag')));
						}
					});
					value = currentFlags;
				} else if (target.attr('type') === 'checkbox' && !target.hasClass('flag-check')) {
					value = target.is(':checked');
				} else if (target.attr('type') === 'number') {
					var num = parseFloat(target.val());
					if (!isNaN(num)) value = num;
				} else if (target.hasClass('color-cell')) {
					value = target.val();
				} else {
					value = target.val();
					if (value === '') value = null;
				}
				
				CastleDBApp.updateCell(row, col, value);
			});
			
			$('.color-cell').each(function() {
				var input = $(this);
				if (input.data('spectrumInitialized')) return;
				input.data('spectrumInitialized', true);
				
				var colorVal = input.val() || '#000000';
				input.spectrum({
					showAlpha: true,
					showInput: true,
					preferredFormat: 'hex8',
					color: colorVal,
					change: function(color) {
						var hex = color.toString();
						input.val(hex);
						var row = parseInt(input.attr('data-row'));
						var col = parseInt(input.attr('data-col'));
						CastleDBApp.updateCell(row, col, hex);
					}
				});
			});
		}
		
		// ==================== Event Handlers ====================
		
		$(document).ready(function() {
			updateRecentList();
			
			$('#table-body').on('click', 'tr', function(e) {
				if (!$(e.target).is('input, select, button, span')) {
					$('#table-body tr').removeClass('selected');
					$(this).addClass('selected');
					selectedRowIndex = parseInt($(this).attr('data-row')) || -1;
				}
			});
			
			$('#table-body').on('contextmenu', 'tr', function(e) {
				e.preventDefault();
				$('#table-body tr').removeClass('selected');
				$(this).addClass('selected');
				selectedRowIndex = parseInt($(this).attr('data-row')) || -1;
				showRowContextMenu(e);
			});
			
			$(document).click(function(e) {
				if (!$(e.target).closest('.context-menu').length) {
					$('.context-menu').hide();
				}
			});
			
			$('#modal-container').on('click', '.modal', function(e) {
				if (e.target === this) {
					closeModal();
				}
			});
			
			document.addEventListener('keydown', function(e) {
				if (e.key === 'Escape') {
					$('.context-menu').hide();
					if ($('#modal-container').html()) {
						closeModal();
					}
				}
			});
		});
	</script>
